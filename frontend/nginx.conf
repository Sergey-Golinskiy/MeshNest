user nginx;
worker_processes auto;
error_log /dev/stderr warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  log_format json escape=json
    '{"t":"$time_iso8601","ip":"$remote_addr","m":"$request_method",'
    '"u":"$request_uri","s":$status,"b":$body_bytes_sent,"rt":$request_time,'
    '"ua":"$http_user_agent","cf":"$http_cf_connecting_ip"}';
  access_log /dev/stdout json;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  server_tokens off;

  # Compression
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/wasm;
  gzip_proxied any;

  # Real-IP from Cloudflare (CF Connecting-IP)
  set_real_ip_from 0.0.0.0/0;
  real_ip_header CF-Connecting-IP;

  # Upload limit per request (под CF Free 100 MB)
  client_max_body_size 100m;
  client_body_buffer_size 1m;
  client_body_timeout 600s;
  send_timeout 600s;

  # Cache for derived (preview/thumbnail/glb) presigned redirects
  proxy_cache_path /var/cache/nginx/derived levels=1:2 keys_zone=derived_cache:50m
                   max_size=8g inactive=7d use_temp_path=off;

  upstream meshnest_api {
    server api:8000 max_fails=3 fail_timeout=30s;
    keepalive 16;
  }

  server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Frontend static (Vite SPA fallback)
    location / {
      try_files $uri /index.html;
      add_header Cache-Control "no-cache, must-revalidate";
    }

    # Long-cache hashed assets
    location ~ ^/assets/.*\.(js|css|woff2?|svg|png|jpg|webp)$ {
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    # Backend API
    location /api/ {
      proxy_pass http://meshnest_api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_buffering off;             # для streaming download / chunked upload
      proxy_request_buffering off;
      proxy_read_timeout 600s;
      proxy_send_timeout 600s;
    }

    # Health
    location = /healthz {
      access_log off;
      return 200 "ok";
      add_header Content-Type text/plain;
    }
  }
}
