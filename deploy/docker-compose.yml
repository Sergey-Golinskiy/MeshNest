name: meshnest

x-api-build: &api_build
  context: ../backend
  dockerfile: Dockerfile

x-common-env: &common_env
  ENVIRONMENT: ${ENVIRONMENT:-prod}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  PUBLIC_URL: ${PUBLIC_URL}
  FRONTEND_URL: ${FRONTEND_URL}
  JWT_SECRET: ${JWT_SECRET}
  DATABASE_URL: ${DATABASE_URL}
  DATABASE_URL_SYNC: ${DATABASE_URL_SYNC}
  REDIS_URL: ${REDIS_URL}
  CELERY_BROKER_URL: ${CELERY_BROKER_URL}
  CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
  S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
  S3_ACCESS_KEY: ${S3_ACCESS_KEY}
  S3_SECRET_KEY: ${S3_SECRET_KEY}
  MEILISEARCH_URL: ${MEILISEARCH_URL}
  MEILISEARCH_MASTER_KEY: ${MEILISEARCH_MASTER_KEY}
  SMTP_HOST: ${SMTP_HOST}
  SMTP_PORT: ${SMTP_PORT}
  SMTP_USER: ${SMTP_USER}
  SMTP_PASSWORD: ${SMTP_PASSWORD}
  SMTP_FROM: ${SMTP_FROM}
  CORS_ORIGINS: ${CORS_ORIGINS}

services:
  # ===== Edge: Cloudflare Tunnel =====
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: meshnest-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - web
    deploy:
      resources:
        limits:
          memory: 256M

  # ===== Frontend (nginx + react dist + reverse-proxy) =====
  web:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: meshnest-web
    restart: unless-stopped
    depends_on:
      - api
    deploy:
      resources:
        limits:
          memory: 256M

  # ===== API =====
  api:
    build: *api_build
    container_name: meshnest-api
    restart: unless-stopped
    environment:
      <<: *common_env
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2 --proxy-headers --forwarded-allow-ips=*"
    volumes:
      - upload_buffer:/var/lib/meshnest/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 1.5G

  # ===== Celery worker =====
  worker:
    build: *api_build
    container_name: meshnest-worker
    restart: unless-stopped
    environment:
      <<: *common_env
    command: celery -A app.tasks.celery_app:celery_app worker --concurrency=2 --loglevel=info -Q default
    volumes:
      - upload_buffer:/var/lib/meshnest/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 3G

  worker-beat:
    build: *api_build
    container_name: meshnest-beat
    restart: unless-stopped
    environment:
      <<: *common_env
    command: celery -A app.tasks.celery_app:celery_app beat --loglevel=info
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          memory: 256M

  # ===== Postgres =====
  postgres:
    image: postgres:16-alpine
    container_name: meshnest-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    command:
      - postgres
      - -c
      - shared_buffers=512MB
      - -c
      - effective_cache_size=1GB
      - -c
      - work_mem=16MB
      - -c
      - maintenance_work_mem=128MB
      - -c
      - max_connections=50
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2.5G

  # ===== Redis =====
  redis:
    image: redis:7-alpine
    container_name: meshnest-redis
    restart: unless-stopped
    command: ["redis-server", "--maxmemory", "384mb", "--maxmemory-policy", "allkeys-lru", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 512M

  # ===== MinIO (S3) =====
  minio:
    image: minio/minio:latest
    container_name: meshnest-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    deploy:
      resources:
        limits:
          memory: 1G

  # ===== Meilisearch =====
  meilisearch:
    image: getmeili/meilisearch:v1.10
    container_name: meshnest-meili
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_MASTER_KEY}
      MEILI_ENV: production
    volumes:
      - meili_data:/meili_data
    deploy:
      resources:
        limits:
          memory: 2G

volumes:
  pg_data:
  redis_data:
  minio_data:
  meili_data:
  upload_buffer:
