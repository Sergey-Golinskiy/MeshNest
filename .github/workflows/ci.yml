name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: meshnest
          POSTGRES_PASSWORD: meshnest
          POSTGRES_DB: meshnest_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U meshnest"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend
        working-directory: backend
        run: |
          pip install -U pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        working-directory: backend
        run: ruff check app

      - name: Type check (mypy on subset)
        working-directory: backend
        run: mypy app/auth app/services/email.py app/services/search.py || true

      - name: Run tests
        working-directory: backend
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://meshnest:meshnest@localhost:5432/meshnest_test
          TEST_DATABASE_URL_SYNC: postgresql+psycopg2://meshnest:meshnest@localhost:5432/meshnest_test
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install frontend
        working-directory: frontend
        run: npm install --no-audit --no-fund

      - name: Type check
        working-directory: frontend
        run: npm run typecheck

      - name: Build
        working-directory: frontend
        run: npm run build
